name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    name: npm audit (high & critical)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: |
          npm audit --audit-level=high --json > audit.json || true
          node -e "
            const r = require('./audit.json');

            // Documented exceptions — reviewed 2026-04-09:
            // GHSA-4r6h-8v6p-xvw6  xlsx Prototype Pollution  — only affects XLSX.read(); write-only usage confirmed
            // GHSA-5pgg-2g8v-p4x9  xlsx ReDoS                — only affects XLSX.read(); write-only usage confirmed
            const ignored = ['GHSA-4r6h-8v6p-xvw6', 'GHSA-5pgg-2g8v-p4x9'];

            const vulns = Object.values(r.vulnerabilities || {})
              .filter(v => v.severity === 'high' || v.severity === 'critical')
              .filter(v => !v.via.every(x => ignored.includes(x.url?.split('/').pop() || x)));

            if (vulns.length) {
              console.error('Unaccepted high/critical vulnerabilities found:');
              vulns.forEach(v => console.error(' -', v.name, '|', v.severity, '|', v.range));
              process.exit(1);
            }

            console.log('Audit passed. All high/critical findings are documented exceptions or clean.');
          "
